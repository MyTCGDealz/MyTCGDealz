<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MyTCGDealz | Sammeln & Investieren</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --accent-red: #a52a2a;
            --dark-bg: #0f0f0f;
            --text-light: #f5f5f5;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            padding: 15px;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        .logo-container img {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }
        h1 {
            font-size: 1.8rem;
            margin: 10px 0;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-box {
            background: rgba(255, 255, 255, 0.07);
            border-left: 4px solid var(--primary-gold);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            margin: 10px 0;
        }
        .loader {
            width: 35px;
            height: 35px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        footer {
            margin-top: auto;
            padding: 25px 10px;
            font-size: 0.8rem;
            width: 100%;
            background: rgba(0,0,0,0.3);
            text-align: center;
        }
        footer a { 
            color: var(--primary-gold); 
            text-decoration: none; 
            padding: 10px;
            display: inline-block; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="logo.png" alt="MyTCGDealz Logo">
        </div>

        <div class="status-box">
            <p><strong>Sammeln & Investieren</strong></p>
            <div class="loader"></div>
            <p>Dein mobiler Kompass für die besten Karten-Deals entsteht gerade.</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 mytcgdealz.de</p>
        <a href="impressum.html">Impressum</a> | 
        <a href="datenschutz.html">Datenschutz</a>
    </footer>

</body>
</html>
