<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyTCGDealz</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-bg: #0f0f0f;
            --text-light: #f5f5f5;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: var(--text-light);
        }

        .viewport-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .container {
            width: 95%;
            max-width: 600px;
            text-align: center;
        }

        .logo-container img {
            width: 100%;
            max-width: 280px;
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            
            /* NEU: Weichzeichner-Effekt für die Kanten */
            -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
            mask-image: radial-gradient(circle, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
        }

        .status-box {
            background: rgba(255, 255, 255, 0.07);
            border-left: 4px solid var(--primary-gold);
            padding: 20px;
            border-radius: 8px;
            word-wrap: break-word;
            hyphens: auto;
        }

        .loader {
            width: 35px;
            height: 35px;
            border: 3px solid rgba(212, 175, 55, 0.1);
            border-top: 3px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 15px auto 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer {
            padding: 20px 10px;
            font-size: 0.8rem;
            text-align: center;
            background: rgba(0,0,0,0.5);
            width: 100%;
        }

        footer a { color: var(--primary-gold); text-decoration: none; padding: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div class="viewport-wrapper">
        <div class="content-area">
            <div class="container">
                <div class="logo-container">
                    <img src="logo.png" alt="MyTCGDealz Logo">
                </div>
                
                <div class="status-box">
                    <p>Dein mobiler Kompass für die besten Karten-Deals entsteht gerade.</p>
                    <div class="loader"></div>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 mytcgdealz.de</p>
            <a href="impressum.html">Impressum</a> | <a href="datenschutz.html">Datenschutz</a>
        </footer>
    </div>

</body>
</html>
